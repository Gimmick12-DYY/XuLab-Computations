name: cistopic
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy
  - scipy
  - pandas
  - pyarrow
  - h5py
  - scikit-learn
  - matplotlib
  - seaborn
  - umap-learn
  - polars
  - pyyaml
  - tqdm
  - openjdk>=17        # required by MALLET
  - r-base>=4.3
  - r-matrix
  - r-optparse
  - bioconductor-singlecellexperiment
  - bioconductor-summarizedexperiment
  - r-seurat           # only needed if the .rds turns out to be a Seurat object
  - pip:
      - git+https://github.com/aertslab/pycisTopic.git
  # MALLET itself is not a pip/conda package; download the binary separately:
  #   wget https://github.com/mimno/Mallet/releases/download/v202108/Mallet-202108-bin.tar.gz
  #   tar -xf Mallet-202108-bin.tar.gz
  # and point `mallet_path` in configs/default.yaml at Mallet-202108/bin/mallet
